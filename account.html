<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | une 'odeur</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .login-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 80vh;
        }
        .login-card {
            width: 350px;
            text-align: center;
        }
        .login-card h2 {
            font-weight: 300;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }
        .input-field {
            text-align: left;
            margin-bottom: 20px;
        }
        .input-field label {
            display: block;
            font-size: 11px;
            font-weight: bold;
            color: #888;
            margin-bottom: 5px;
        }
        .input-field input {
            width: 100%;
            height: 40px;
            background: var(--wf-light-gray);
            border: 1px solid var(--wf-border);
            border-radius: 4px;
            padding: 0 10px;
            box-sizing: border-box;
        }
        .auth-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 30px;
        }
        .btn-action {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            color: white;
        }
        .btn-login { background-color: #555; }
        .btn-signup { background-color: #888; }
    </style>
</head>
<body>

    <header class="navbar">
        <div class="nav-left">
            <a href="product.html" style="color:white; text-decoration:none;"><i class="fas fa-arrow-left"></i></a>
        </div>
        <div class="logo-small">une 'odeur</div>
        <div class="nav-right"><i class="far fa-user-circle"></i></div>
    </header>

    <div class="login-wrapper">
        <div class="login-card">
            <h2>User Login</h2>
            <form>
                <div class="input-field">
                    <label>EMAIL</label>
                    <input type="email" placeholder="email@example.com">
                </div>
                <div class="input-field">
                    <label>PASSWORD</label>
                    <input type="password">
                </div>
                
                <div class="auth-buttons">
                    <button type="submit" class="btn-action btn-login">Login</button>
                    <button type="button" class="btn-action btn-signup">Sign Up</button>
                </div>
            </form>
        </div>
    </div>

</body>
</html>
